ollama:
  model: "llama3.2:latest"
  base_url: "http://localhost:11434"
  temperature: 0.3
  max_tokens: 2000

scan:
  timeout: 10
  max_pages: 50
  user_agent: "DarkLight/1.0"

performance:
  request_delay: 0.5
  max_concurrent_ai: 2
  ai_limit_default: 5
  cpu_threshold: 70
  
vulnerability_patterns:
  sql_injection:
    - "SELECT.*FROM"
    - "INSERT INTO"
    - "UPDATE.*SET"
    - "DELETE FROM"
    - "\\$\\_GET"
    - "\\$\\_POST"
    
  xss:
    - "document\\.write"
    - "innerHTML"
    - "eval\\("
    - "setTimeout\\(.*\\)"
    - "location\\.hash"
    - "\\\\<script\\\\>"
    
  command_injection:
    - "system\\("
    - "exec\\("
    - "shell_exec\\("
    - "popen\\("
    
  sensitive_data:
    - "password"
    - "secret"
    - "api_key"
    - "token"
    - "private_key"
